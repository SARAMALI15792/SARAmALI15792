<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#6366f1" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="#0a0a12" rx="16"/>

  <!-- Grid -->
  <rect width="900" height="260" fill="url(#grid)" opacity="0.06" rx="16"/>
  <line x1="0" y1="130" x2="900" y2="130" stroke="#6366f1" stroke-width="0.3" stroke-dasharray="4 8" opacity="0.2"/>

  <!-- Orbs -->
  <ellipse cx="860" cy="-30" rx="200" ry="200" fill="url(#orb1)"/>
  <ellipse cx="380" cy="300" rx="150" ry="150" fill="url(#orb2)"/>

  <!-- Floating dots -->
  <circle cx="820" cy="32" r="5" fill="#6366f1" opacity="0.45"/>
  <circle cx="848" cy="62" r="3" fill="#818cf8" opacity="0.3"/>
  <circle cx="800" cy="195" r="4" fill="#a5b4fc" opacity="0.35"/>
  <circle cx="868" cy="115" r="2.5" fill="#c7d2fe" opacity="0.25"/>

  <!-- Badge row -->
  <text x="44" y="50" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6366f1" letter-spacing="2">01 // PROFILE</text>
  <line x1="158" y1="45" x2="198" y2="45" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
  <text x="206" y="50" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6366f1" opacity="0.45" letter-spacing="1.5">Pakistan</text>

  <!-- Name -->
  <text x="44" y="90" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#f1f0ff" letter-spacing="-0.8">Saram Ali</text>

  <!-- Role -->
  <text x="44" y="116" font-family="'JetBrains Mono', monospace" font-size="14" fill="#818cf8">Agentic AI Engineer_</text>

  <!-- SDD-RI highlight pill -->
  <rect x="44" y="128" width="474" height="26" rx="7" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.6"/>
  <circle cx="60" cy="141" r="4" fill="#6366f1"/>
  <text x="72" y="145" font-family="'JetBrains Mono', monospace" font-size="11" fill="#c7d2fe" font-weight="700" letter-spacing="0.5">Methodology: SDD-RI</text>
  <line x1="206" y1="133" x2="206" y2="153" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="214" y="145" font-family="'JetBrains Mono', monospace" font-size="10" fill="#a5b4fc" letter-spacing="0.3">Spec-Driven Development with Reusable Intelligence</text>

  <!-- Tech chips: Claude Code amber accent -->
  <rect x="44" y="166" width="90" height="22" rx="11" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="89" y="181" font-family="'JetBrains Mono', monospace" font-size="10" fill="#fde68a" text-anchor="middle">Claude Code</text>

  <rect x="142" y="166" width="72" height="22" rx="11" fill="rgba(99,102,241,0.1)" stroke="#6366f1" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="178" y="181" font-family="'JetBrains Mono', monospace" font-size="10" fill="#a5b4fc" text-anchor="middle">AI Agents</text>

  <rect x="222" y="166" width="92" height="22" rx="11" fill="rgba(99,102,241,0.08)" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="268" y="181" font-family="'JetBrains Mono', monospace" font-size="10" fill="#a5b4fc" text-anchor="middle">MCP Servers</text>

  <rect x="322" y="166" width="136" height="22" rx="11" fill="rgba(99,102,241,0.08)" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="390" y="181" font-family="'JetBrains Mono', monospace" font-size="10" fill="#a5b4fc" text-anchor="middle">Browser Automation</text>

  <rect x="466" y="166" width="72" height="22" rx="11" fill="rgba(99,102,241,0.08)" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="502" y="181" font-family="'JetBrains Mono', monospace" font-size="10" fill="#a5b4fc" text-anchor="middle">OpenAI SDK</text>

  <!-- Tagline -->
  <rect x="44" y="204" width="2" height="26" fill="#6366f1" rx="1"/>
  <text x="56" y="221" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8" font-style="italic">Building AI that acts — not just answers.</text>

  <!-- Right: code block decoration -->
  <text x="640" y="90"  font-family="'JetBrains Mono', monospace" font-size="11" fill="#6366f1" opacity="0.45">agent = SDD_RI(</text>
  <text x="640" y="108" font-family="'JetBrains Mono', monospace" font-size="11" fill="#a5b4fc" opacity="0.25">  model="claude-code",</text>
  <text x="640" y="126" font-family="'JetBrains Mono', monospace" font-size="11" fill="#a5b4fc" opacity="0.25">  spec="spec.md",</text>
  <text x="640" y="144" font-family="'JetBrains Mono', monospace" font-size="11" fill="#a5b4fc" opacity="0.25">  tools=[mcp, browser],</text>
  <text x="640" y="162" font-family="'JetBrains Mono', monospace" font-size="11" fill="#a5b4fc" opacity="0.25">  reusable=True</text>
  <text x="640" y="180" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6366f1" opacity="0.45">)</text>
  <text x="640" y="200" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6366f1" opacity="0.3">agent.ship()</text>
</svg>
